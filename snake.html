<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game 🐍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }
        
        .game-container {
            position: relative;
            border: 4px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.3),
                        inset 0 0 60px rgba(0, 0, 0, 0.5);
        }
        
        canvas {
            display: block;
            border-radius: 6px;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a15 100%);
        }
        
        .score-board {
            display: flex;
            justify-content: space-between;
            width: 400px;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }
        
        .score {
            padding: 0.5rem 1.5rem;
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            border-radius: 10px;
        }
        
        .score span {
            color: #00ff88;
            font-weight: bold;
        }
        
        .high-score {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }
        
        .high-score span {
            color: #ffd700;
        }
        
        .controls {
            margin-top: 1.5rem;
            text-align: center;
            color: #888;
        }
        
        .controls kbd {
            background: #333;
            padding: 0.3rem 0.6rem;
            border-radius: 5px;
            border: 1px solid #555;
            font-family: monospace;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 2rem 3rem;
            border-radius: 20px;
            border: 3px solid #ff4444;
            display: none;
        }
        
        .game-over h2 {
            color: #ff4444;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .game-over p {
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }
        
        .game-over button {
            background: linear-gradient(90deg, #00ff88, #00ccff);
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            color: #000;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .game-over button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        
        .start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 2rem 3rem;
            border-radius: 20px;
            border: 3px solid #00ff88;
        }
        
        .start-screen h2 {
            color: #00ff88;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .start-screen button {
            background: linear-gradient(90deg, #00ff88, #00ccff);
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            color: #000;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🐍 Snake</h1>
    
    <div class="score-board">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="score high-score">Best: <span id="highScore">0</span></div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="start-screen" id="startScreen">
            <h2>🎮 Ready?</h2>
            <p>Use arrow keys or WASD to move</p>
            <br>
            <button onclick="startGame()">Start Game</button>
        </div>
        
        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>
    
    <div class="controls">
        <p>Use <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> to move</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        
        let snake = [];
        let food = { x: 10, y: 10 };
        
        let dx = 0;
        let dy = 0;
        
        let gameRunning = false;
        let gameLoop;
        
        document.getElementById('highScore').textContent = highScore;
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            resetGame();
        }
        
        function resetGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').style.display = 'none';
            gameRunning = true;
            spawnFood();
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 100);
        }
        
        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            
            // Make sure food doesn't spawn on snake
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) {
                    spawnFood();
                    break;
                }
            }
        }
        
        function update() {
            if (!gameRunning) return;
            
            // Move snake
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            // Check collision with walls
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            // Check collision with self
            for (let part of snake) {
                if (head.x === part.x && head.y === part.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // Check if ate food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                spawnFood();
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // Draw food
            ctx.fillStyle = '#ff4444';
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Draw snake
            for (let i = 0; i < snake.length; i++) {
                const part = snake[i];
                
                if (i === 0) {
                    // Head
                    ctx.fillStyle = '#00ff88';
                    ctx.shadowColor = '#00ff88';
                    ctx.shadowBlur = 10;
                } else {
                    // Body
                    ctx.fillStyle = `rgb(0, ${255 - i * 8}, ${136 - i * 4})`;
                    ctx.shadowBlur = 0;
                }
                
                ctx.beginPath();
                ctx.roundRect(
                    part.x * gridSize + 1,
                    part.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    5
                );
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }
        
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning && document.getElementById('startScreen').style.display !== 'none') {
                return;
            }
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
            }
            
            // Prevent scrolling
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }
        });
        
        // Initial draw
        draw();
    </script>
</body>
</html>
