<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pllugi</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <img class="site-logo" src="images/logo.png" alt="Pllugi image">

    <form class="secret-form" id="secretForm">
      <label for="secretPhrase">Secret Phrase</label>
      <input id="secretPhrase" name="secretPhrase" type="password" autocomplete="off" required>
      <button type="submit">Enter</button>
      <p class="error-message" id="errorMessage" aria-live="polite"></p>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
