<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer - 10 Levels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #eee;
        }
        h1 {
            margin-bottom: 10px;
            color: #00d4ff;
            text-shadow: 0 0 10px #00d4ff;
        }
        #gameContainer {
            position: relative;
            border: 4px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 18px;
            text-shadow: 1px 1px 2px black;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            text-align: center;
            text-shadow: 2px 2px 4px black;
            display: none;
        }
        #controls {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🚀 PLATFORMER</h1>
    <div id="gameContainer">
        <canvas id="game" width="800" height="500"></canvas>
        <div id="ui">Level: <span id="level">1</span>/10 | Lives: <span id="lives">3</span></div>
        <div id="message"></div>
    </div>
    <div id="controls">← → or A/D to move | ↑ or W or SPACE to jump | R to restart</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const ui = { level: document.getElementById('level'), lives: document.getElementById('lives'), message: document.getElementById('message') };

        // Game state
        let game = { level: 1, lives: 9, state: 'playing' };
        
        // Player
        const player = {
            x: 50, y: 400, width: 30, height: 30,
            vx: 0, vy: 0,
            speed: 1, jump: -12, gravity: 0.6,
            onGround: false, color: '#00ff88'
        };

        // Physics
        const friction = 0.85;
        let keys = {};

        // Level data - platforms, hazards, goal
        const levels = [
            // Level 1 - Introduction
            {
                platforms: [
                    { x: 0, y: 470, w: 800, h: 30 },
                    { x: 200, y: 400, w: 100, h: 20 },
                    { x: 400, y: 350, w: 100, h: 20 },
                    { x: 600, y: 300, w: 150, h: 20 }
                ],
                hazards: [],
                goal: { x: 680, y: 260, w: 30, h: 40 },
                start: { x: 50, y: 430 }
            },
            // Level 2 - First gap
            {
                platforms: [
                    { x: 0, y: 470, w: 150, h: 30 },
                    { x: 250, y: 420, w: 80, h: 20 },
                    { x: 420, y: 370, w: 80, h: 20 },
                    { x: 580, y: 320, w: 80, h: 20 },
                    { x: 720, y: 270, w: 80, h: 20 }
                ],
                hazards: [{ x: 150, y: 490, w: 100, h: 10 }],
                goal: { x: 750, y: 230, w: 30, h: 40 },
                start: { x: 50, y: 430 }
            },
            // Level 3 - Vertical climb
            {
                platforms: [
                    { x: 0, y: 470, w: 800, h: 30 },
                    { x: 100, y: 400, w: 60, h: 20 },
                    { x: 250, y: 340, w: 60, h: 20 },
                    { x: 400, y: 280, w: 60, h: 20 },
                    { x: 550, y: 220, w: 60, h: 20 },
                    { x: 700, y: 160, w: 80, h: 20 }
                ],
                hazards: [{ x: 300, y: 485, w: 200, h: 15 }],
                goal: { x: 730, y: 120, w: 30, h: 40 },
                start: { x: 50, y: 430 }
            },
            // Level 4 - Floating islands
            {
                platforms: [
                    { x: 0, y: 470, w: 100, h: 30 },
                    { x: 150, y: 420, w: 50, h: 20 },
                    { x: 280, y: 380, w: 50, h: 20 },
                    { x: 400, y: 320, w: 50, h: 20 },
                    { x: 520, y: 260, w: 50, h: 20 },
                    { x: 650, y: 350, w: 50, h: 20 },
                    { x: 750, y: 280, w: 50, h: 20 }
                ],
                hazards: [{ x: 100, y: 490, w: 650, h: 10 }],
                goal: { x: 760, y: 240, w: 30, h: 40 },
                start: { x: 30, y: 430 }
            },
            // Level 5 - Lava pits
            {
                platforms: [
                    { x: 0, y: 470, w: 100, h: 30 },
                    { x: 180, y: 420, w: 80, h: 20 },
                    { x: 350, y: 380, w: 60, h: 20 },
                    { x: 500, y: 340, w: 60, h: 20 },
                    { x: 650, y: 300, w: 60, h: 20 },
                    { x: 750, y: 250, w: 50, h: 20 }
                ],
                hazards: [
                    { x: 100, y: 485, w: 80, h: 15 },
                    { x: 260, y: 485, w: 90, h: 15 },
                    { x: 410, y: 485, w: 90, h: 15 },
                    { x: 560, y: 485, w: 90, h: 15 },
                    { x: 710, y: 485, w: 90, h: 15 }
                ],
                goal: { x: 760, y: 210, w: 30, h: 40 },
                start: { x: 30, y: 430 }
            },
            // Level 6 - Narrow platforms
            {
                platforms: [
                    { x: 0, y: 470, w: 80, h: 30 },
                    { x: 120, y: 430, w: 40, h: 20 },
                    { x: 200, y: 390, w: 40, h: 20 },
                    { x: 280, y: 350, w: 40, h: 20 },
                    { x: 360, y: 310, w: 40, h: 20 },
                    { x: 440, y: 270, w: 40, h: 20 },
                    { x: 520, y: 310, w: 40, h: 20 },
                    { x: 600, y: 350, w: 40, h: 20 },
                    { x: 680, y: 390, w: 40, h: 20 },
                    { x: 760, y: 430, w: 40, h: 20 }
                ],
                hazards: [{ x: 80, y: 490, w: 680, h: 10 }],
                goal: { x: 765, y: 390, w: 30, h: 40 },
                start: { x: 20, y: 430 }
            },
            // Level 7 - The Gauntlet
            {
                platforms: [
                    { x: 0, y: 470, w: 60, h: 30 },
                    { x: 100, y: 420, w: 50, h: 20 },
                    { x: 200, y: 370, w: 50, h: 20 },
                    { x: 300, y: 320, w: 50, h: 20 },
                    { x: 400, y: 270, w: 50, h: 20 },
                    { x: 500, y: 220, w: 50, h: 20 },
                    { x: 600, y: 270, w: 50, h: 20 },
                    { x: 700, y: 320, w: 50, h: 20 }
                ],
                hazards: [
                    { x: 60, y: 485, w: 40, h: 15 },
                    { x: 150, y: 485, w: 50, h: 15 },
                    { x: 250, y: 485, w: 50, h: 15 },
                    { x: 350, y: 485, w: 50, h: 15 },
                    { x: 450, y: 485, w: 50, h: 15 },
                    { x: 550, y: 485, w: 50, h: 15 },
                    { x: 650, y: 485, w: 50, h: 15 }
                ],
                goal: { x: 720, y: 280, w: 30, h: 40 },
                start: { x: 20, y: 430 }
            },
            // Level 8 - Steps of doom
            {
                platforms: [
                    { x: 0, y: 470, w: 50, h: 30 },
                    { x: 80, y: 440, w: 40, h: 20 },
                    { x: 150, y: 410, w: 40, h: 20 },
                    { x: 220, y: 380, w: 40, h: 20 },
                    { x: 290, y: 350, w: 40, h: 20 },
                    { x: 360, y: 320, w: 40, h: 20 },
                    { x: 430, y: 290, w: 40, h: 20 },
                    { x: 500, y: 260, w: 40, h: 20 },
                    { x: 570, y: 230, w: 40, h: 20 },
                    { x: 640, y: 200, w: 40, h: 20 },
                    { x: 710, y: 170, w: 40, h: 20 },
                    { x: 780, y: 140, w: 20, h: 20 }
                ],
                hazards: [
                    { x: 50, y: 490, w: 750, h: 10 }
                ],
                goal: { x: 780, y: 100, w: 20, h: 40 },
                start: { x: 10, y: 430 }
            },
            // Level 9 - Maze
            {
                platforms: [
                    { x: 0, y: 470, w: 80, h: 30 },
                    { x: 120, y: 420, w: 150, h: 20 },
                    { x: 120, y: 320, w: 80, h: 20 },
                    { x: 280, y: 370, w: 80, h: 20 },
                    { x: 320, y: 270, w: 80, h: 20 },
                    { x: 450, y: 220, w: 80, h: 20 },
                    { x: 450, y: 350, w: 80, h: 20 },
                    { x: 550, y: 300, w: 80, h: 20 },
                    { x: 600, y: 400, w: 80, h: 20 },
                    { x: 700, y: 180, w: 80, h: 20 },
                    { x: 750, y: 300, w: 50, h: 20 }
                ],
                hazards: [
                    { x: 80, y: 490, w: 40, h: 10 },
                    { x: 200, y: 490, w: 80, h: 10 },
                    { x: 360, y: 490, w: 90, h: 10 },
                    { x: 530, y: 490, w: 70, h: 10 },
                    { x: 680, y: 490, w: 70, h: 10 }
                ],
                goal: { x: 760, y: 260, w: 30, h: 40 },
                start: { x: 20, y: 430 }
            },
            // Level 10 - Final Challenge
            {
                platforms: [
                    { x: 0, y: 470, w: 40, h: 30 },
                    { x: 80, y: 430, w: 30, h: 20 },
                    { x: 150, y: 390, w: 30, h: 20 },
                    { x: 220, y: 350, w: 30, h: 20 },
                    { x: 290, y: 310, w: 30, h: 20 },
                    { x: 360, y: 350, w: 30, h: 20 },
                    { x: 430, y: 390, w: 30, h: 20 },
                    { x: 500, y: 350, w: 30, h: 20 },
                    { x: 570, y: 290, w: 30, h: 20 },
                    { x: 640, y: 230, w: 30, h: 20 },
                    { x: 710, y: 170, w: 30, h: 20 },
                    { x: 760, y: 120, w: 40, h: 20 }
                ],
                hazards: [
                    { x: 40, y: 490, w: 40, h: 10 },
                    { x: 110, y: 490, w: 40, h: 10 },
                    { x: 180, y: 490, w: 40, h: 10 },
                    { x: 250, y: 490, w: 40, h: 10 },
                    { x: 320, y: 490, w: 40, h: 10 },
                    { x: 390, y: 490, w: 40, h: 10 },
                    { x: 460, y: 490, w: 40, h: 10 },
                    { x: 530, y: 490, w: 40, h: 10 },
                    { x: 600, y: 490, w: 40, h: 10 },
                    { x: 670, y: 490, w: 40, h: 10 },
                    { x: 740, y: 490, w: 60, h: 10 }
                ],
                goal: { x: 770, y: 80, w: 30, h: 40 },
                start: { x: 10, y: 430 }
            }
        ];

        let currentLevel = null;

        function loadLevel(n) {
            currentLevel = levels[n - 1];
            player.x = currentLevel.start.x;
            player.y = currentLevel.start.y;
            player.vx = 0;
            player.vy = 0;
            ui.level.textContent = n;
        }

        function showMessage(text, duration = 2000) {
            ui.message.textContent = text;
            ui.message.style.display = 'block';
            if (duration > 0) setTimeout(() => ui.message.style.display = 'none', duration);
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.height > rect2.y;
        }

        function update() {
            if (game.state !== 'playing') return;

            // Input
            if (keys['ArrowLeft'] || keys['KeyA']) player.vx -= player.speed;
            if (keys['ArrowRight'] || keys['KeyD']) player.vx += player.speed;
            if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && player.onGround) {
                player.vy = player.jump;
                player.onGround = false;
            }

            // Physics
            player.vx *= friction;
            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;

            // Boundaries
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // Fall death
            if (player.y > canvas.height) {
                die();
                return;
            }

            // Platform collision
            player.onGround = false;
            for (let plat of currentLevel.platforms) {
                if (checkCollision(player, plat)) {
                    // Top collision
                    if (player.vy > 0 && player.y + player.height - player.vy <= plat.y) {
                        player.y = plat.y - player.height;
                        player.vy = 0;
                        player.onGround = true;
                    }
                    // Bottom collision
                    else if (player.vy < 0 && player.y - player.vy >= plat.y + plat.h) {
                        player.y = plat.y + plat.h;
                        player.vy = 0;
                    }
                    // Side collision
                    else {
                        if (player.vx > 0) player.x = plat.x - player.width;
                        else if (player.vx < 0) player.x = plat.x + plat.w;
                        player.vx = 0;
                    }
                }
            }

            // Hazard collision
            for (let haz of currentLevel.hazards) {
                if (checkCollision(player, haz)) {
                    die();
                    return;
                }
            }

            // Goal
            if (checkCollision(player, currentLevel.goal)) {
                if (game.level < 10) {
                    game.level++;
                    showMessage(`Level ${game.level}!`);
                    loadLevel(game.level);
                } else {
                    game.state = 'won';
                    showMessage('🎉 YOU WIN! 🎉', 0);
                }
            }
        }

        function die() {
            game.lives--;
            ui.lives.textContent = game.lives;
            if (game.lives <= 0) {
                game.state = 'gameover';
                showMessage('GAME OVER - Press R', 0);
            } else {
                player.x = currentLevel.start.x;
                player.y = currentLevel.start.y;
                player.vx = 0;
                player.vy = 0;
                showMessage('Ouch!');
            }
        }

        function draw() {
            // Clear
            ctx.fillStyle = '#0f0c29';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!currentLevel) return;

            // Draw platforms
            for (let plat of currentLevel.platforms) {
                ctx.fillStyle = '#666';
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 2;
                ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
            }

            // Draw hazards
            for (let haz of currentLevel.hazards) {
                ctx.fillStyle = '#ff4444';
                ctx.fillRect(haz.x, haz.y, haz.w, haz.h);
            }

            // Draw goal
            const goal = currentLevel.goal;
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
            ctx.fillStyle = '#ff8800';
            ctx.font = '20px Arial';
            ctx.fillText('★', goal.x + 5, goal.y + 25);

            // Draw player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // Eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(player.x + 5, player.y + 8, 6, 6);
            ctx.fillRect(player.x + 18, player.y + 8, 6, 6);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function restart() {
            game = { level: 1, lives: 3, state: 'playing' };
            ui.lives.textContent = 3;
            ui.message.style.display = 'none';
            loadLevel(1);
        }

        // Input handlers
        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'KeyR') restart();
            if (['Space', 'ArrowUp', 'ArrowDown'].includes(e.code)) e.preventDefault();
        });
        document.addEventListener('keyup', e => keys[e.code] = false);

        // Start
        loadLevel(1);
        gameLoop();
    </script>
</body>
</html>
